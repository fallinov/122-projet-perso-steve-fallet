<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon projet 122</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Les Jeux-Vidéos</h1>
  </header>

  <main>
    <!-- novalidate désactive la validation HTML5 native (les bulles "Veuillez remplir ce champ").
         On garde les attributs required/min/max pour la sémantique et le fallback,
         mais c'est notre code JS qui prend le contrôle complet de la validation. -->
    <form id="form-add" novalidate>
      <h2>Ajouter</h2>

      <div class="form-group">
        <label for="input-name">Nom</label>
        <input type="text" id="input-name" placeholder="Ex : The Witcher 3" required>
      </div>

      <div class="form-group">
        <label for="input-category">Catégorie</label>
        <select id="input-category">
          <option value="Action">Action</option>
          <option value="Aventure">Aventure</option>
          <option value="FPS">FPS</option>
          <option value="RPG">RPG</option>
          <option value="Stratégie">Stratégie</option>
        </select>
      </div>

      <div class="form-group">
        <label for="input-rating">Note (1–10)</label>
        <input type="number" id="input-rating" min="1" max="10" placeholder="8">
      </div>

      <button type="submit" class="btn btn-primary">Ajouter</button>
    </form>

    <div class="toolbar">
      <!-- Label visuellement masqué mais lu par les lecteurs d'écran (accessibilité).
           Le placeholder seul ne suffit pas comme label : il disparaît à la saisie. -->
      <label for="search" class="sr-only">Rechercher un jeu</label>
      <input type="text" id="search" placeholder="Rechercher un jeu...">
      <button id="btn-sort" class="btn btn-primary">Trier par note ↓ (DESC)</button>
    </div>
    <!-- div (et non ul) : un ul ne doit contenir que des li. Ici on a des article
         (cartes) ou un p (message "Aucun résultat") en grille CSS. -->
    <div id="list"></div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
